<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>r/menopause Research</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f7f8;
      color: #1c1c1e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #ff4500;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -.3px; }
    header .sub { font-size: .85rem; opacity: .85; }

    /* ── Controls ── */
    .controls {
      max-width: 860px;
      margin: 1.4rem auto .8rem;
      padding: 0 1rem;
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls label { font-size: .85rem; font-weight: 600; color: #555; }
    .controls select, .controls input[type=number] {
      padding: .4rem .7rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: .9rem;
      background: #fff;
    }
    .controls button {
      padding: .45rem 1.1rem;
      background: #ff4500;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .controls button:hover { background: #d93a00; }
    .controls button:disabled { background: #ccc; cursor: not-allowed; }

    /* ── Search ── */
    .search-wrap {
      max-width: 860px;
      margin: 0 auto .6rem;
      padding: 0 1rem;
    }
    .search-wrap input {
      width: 100%;
      padding: .5rem .9rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: .95rem;
    }

    /* ── Status / spinner ── */
    #status {
      text-align: center;
      padding: 2rem;
      color: #888;
      font-size: .95rem;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #eee;
      border-top-color: #ff4500;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Post list ── */
    #posts {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    /* ── Post card ── */
    .post-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      overflow: hidden;
      transition: box-shadow .15s;
    }
    .post-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.13); }

    .post-header {
      display: flex;
      gap: .75rem;
      padding: .9rem 1rem;
      cursor: pointer;
      user-select: none;
    }

    .vote-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 40px;
      gap: 2px;
    }
    .score {
      font-size: .85rem;
      font-weight: 700;
      color: #ff4500;
    }
    .score-label { font-size: .65rem; color: #aaa; }

    .post-body { flex: 1; min-width: 0; }
    .post-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: .3rem;
    }
    .post-title a {
      color: inherit;
      text-decoration: none;
    }
    .post-title a:hover { color: #ff4500; }

    .post-meta {
      font-size: .78rem;
      color: #888;
      display: flex;
      gap: .8rem;
      flex-wrap: wrap;
    }
    .post-meta span { display: flex; align-items: center; gap: .25rem; }

    .post-preview {
      font-size: .82rem;
      color: #555;
      margin-top: .4rem;
      line-height: 1.5;
      border-left: 3px solid #ff4500;
      padding-left: .6rem;
    }

    /* chevron toggle */
    .toggle-btn {
      align-self: flex-start;
      background: none;
      border: none;
      cursor: pointer;
      padding: .2rem;
      color: #aaa;
      font-size: 1rem;
      transition: transform .2s;
    }
    .toggle-btn.open { transform: rotate(180deg); }

    /* ── Comments panel ── */
    .comments-panel {
      display: none;
      border-top: 1px solid #f0f0f0;
      padding: .75rem 1rem;
      background: #fafafa;
    }
    .comments-panel.open { display: block; }

    .comment-loading {
      font-size: .82rem;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .comment-loading .mini-spin {
      width: 14px; height: 14px;
      border: 2px solid #ddd;
      border-top-color: #ff4500;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    .comment {
      font-size: .83rem;
      line-height: 1.55;
      color: #333;
      padding: .5rem 0;
      border-bottom: 1px solid #ececec;
    }
    .comment:last-child { border-bottom: none; }
    .comment-num {
      font-size: .72rem;
      font-weight: 700;
      color: #ff4500;
      margin-bottom: .2rem;
    }

    .no-comments { font-size: .82rem; color: #aaa; padding: .5rem 0; }

    /* error */
    .error-msg {
      background: #fff3f0;
      color: #c0392b;
      border: 1px solid #f5c6c0;
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .88rem;
      max-width: 860px;
      margin: 0 auto 1rem;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>r/menopause Research Viewer</h1>
    <div class="sub">Browse top posts and community discussions</div>
  </div>
</header>

<div class="controls">
  <label for="category">Sort:</label>
  <select id="category">
    <option value="hot">Hot</option>
    <option value="new">New</option>
    <option value="top">Top</option>
    <option value="rising">Rising</option>
  </select>

  <label for="limit">Posts:</label>
  <input type="number" id="limit" value="10" min="1" max="50" style="width:64px" />

  <button id="loadBtn" onclick="loadPosts()">Load Posts</button>
</div>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Filter posts by keyword…" oninput="filterPosts()" />
</div>

<div id="status"></div>
<div id="error" class="error-msg" style="display:none"></div>
<div id="posts"></div>

<script>
  let allPosts = [];

  async function loadPosts() {
    const category = document.getElementById("category").value;
    const limit = document.getElementById("limit").value;
    const btn = document.getElementById("loadBtn");
    btn.disabled = true;

    document.getElementById("error").style.display = "none";
    document.getElementById("posts").innerHTML = "";
    document.getElementById("status").innerHTML =
      `<div class="spinner"></div>Fetching posts from r/menopause…`;

    try {
      const res = await fetch(`/api/posts?category=${category}&limit=${limit}`);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      allPosts = data.posts;
      renderPosts(allPosts);
    } catch (e) {
      showError(e.message);
    } finally {
      btn.disabled = false;
      document.getElementById("status").innerHTML = "";
    }
  }

  function filterPosts() {
    const q = document.getElementById("search").value.toLowerCase();
    const filtered = q
      ? allPosts.filter(p =>
          p.title.toLowerCase().includes(q) ||
          p.selftext.toLowerCase().includes(q))
      : allPosts;
    renderPosts(filtered);
  }

  function renderPosts(posts) {
    const container = document.getElementById("posts");
    if (!posts.length) {
      container.innerHTML = `<p style="text-align:center;color:#aaa;padding:2rem">No posts found.</p>`;
      return;
    }
    container.innerHTML = posts.map((p, i) => postCard(p, i)).join("");
  }

  function postCard(post, idx) {
    const score = post.score >= 1000
      ? (post.score / 1000).toFixed(1) + "k"
      : post.score;
    const preview = post.selftext
      ? `<div class="post-preview">${esc(post.selftext.slice(0, 200))}${post.selftext.length > 200 ? "…" : ""}</div>`
      : "";
    const permalink = post.url.replace("https://reddit.com", "");
    return `
      <div class="post-card" id="card-${idx}">
        <div class="post-header" onclick="toggleComments(${idx}, '${escAttr(permalink)}')">
          <div class="vote-col">
            <span class="score">${score}</span>
            <span class="score-label">pts</span>
          </div>
          <div class="post-body">
            <div class="post-title">
              <a href="${escAttr(post.url)}" target="_blank" onclick="event.stopPropagation()">
                ${esc(post.title)}
              </a>
            </div>
            <div class="post-meta">
              <span>💬 ${post.num_comments} comments</span>
              <span><a href="${escAttr(post.url)}" target="_blank" onclick="event.stopPropagation()" style="color:#aaa">open ↗</a></span>
            </div>
            ${preview}
          </div>
          <button class="toggle-btn" id="toggle-${idx}" title="Show comments">▼</button>
        </div>
        <div class="comments-panel" id="comments-${idx}"></div>
      </div>`;
  }

  async function toggleComments(idx, permalink) {
    const panel = document.getElementById(`comments-${idx}`);
    const btn = document.getElementById(`toggle-${idx}`);

    if (panel.classList.contains("open")) {
      panel.classList.remove("open");
      btn.classList.remove("open");
      return;
    }

    panel.classList.add("open");
    btn.classList.add("open");

    if (panel.dataset.loaded) return; // already fetched

    panel.innerHTML = `<div class="comment-loading"><div class="mini-spin"></div> Loading comments…</div>`;

    try {
      const res = await fetch(`/api/comments?permalink=${encodeURIComponent(permalink)}`);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      if (!data.comments.length) {
        panel.innerHTML = `<div class="no-comments">No comments yet.</div>`;
      } else {
        panel.innerHTML = data.comments.map((c, i) =>
          `<div class="comment">
            <div class="comment-num">Comment ${i + 1}</div>
            ${esc(c)}
          </div>`
        ).join("");
      }
      panel.dataset.loaded = "1";
    } catch (e) {
      panel.innerHTML = `<div class="no-comments" style="color:#c0392b">Failed to load comments: ${esc(e.message)}</div>`;
    }
  }

  function showError(msg) {
    const el = document.getElementById("error");
    el.textContent = "Error: " + msg;
    el.style.display = "block";
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
  function escAttr(s) { return esc(s); }

  // Load on startup
  loadPosts();
</script>
</body>
</html>
